    .character-card {
      background: #fff;
      padding: 15px;
      width: 220px;
      text-align: center;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }

    .character-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 4px 12px rgba(239, 35, 60, 0.6),
                  0 0 15px rgba(239, 35, 60, 0.8);
      border: 2px solid #ef233c;
    }

    .character-details {
      display: none;
      margin-top: 10px;
      padding: 10px;
      background: #f8f8f8;
      border-radius: 6px;
      font-size: 14px;
      text-align: left;
    }

    .character-card.active .character-details {
      display: block;
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero {
      padding: 40px 0;
    }

    .hero img {
      max-width: 40%;
      height: auto;
    }
